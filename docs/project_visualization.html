<script>
const D=JSON.parse(document.getElementById('demoData').textContent);let mode='request';
const E=[
{id:'ingest',m:'POST',p:'/v2/course-packs',l:'Course Pack ingest',s:'여러 강의자료를 하나의 pack_id와 chunk 묶음으로 변환',req:{paths:['test_data/lecture/자연어처리_11주차 1차시.pptx','test_data/lecture/자연어처리_11주차 2차시.pptx','test_data/lecture/자연어처리_11주차 3차시.pptx'],output_root:'outputs/static_demo',max_chunk_chars:900},res:()=>D.pack,ren:ingest},
{id:'ask',m:'POST',p:'/v2/course-packs/ask',l:'Q&A',s:'질문과 관련된 chunk만 뽑아 source-grounded answer 생성',req:{pack_id:D.pack.pack_id,question:'BPE OOV 토크나이저 핵심 내용',output_root:'outputs/static_demo',top_k:5},res:()=>D.ask,ren:ask},
{id:'summary',m:'POST',p:'/v2/course-packs/summary',l:'Summary',s:'강의별 요약, 핵심 개념, 연결 관계를 source와 함께 생성',req:{pack_id:D.pack.pack_id,query:'course pack overview summary',output_root:'outputs/static_demo',top_k:8,max_items:5,llm_provider:'mock'},res:()=>D.summary,ren:summary},
{id:'study',m:'POST',p:'/v2/course-packs/study-kit',l:'Study Kit',s:'요약, key points, quiz, flashcards를 학습 자료로 렌더링',req:{pack_id:D.pack.pack_id,query:'BPE LSTM GraphRAG-lite',output_root:'outputs/static_demo',top_k:6,max_items:4},res:()=>D.studyKit,ren:study},
{id:'audio',m:'POST',p:'/v2/course-packs/audio-script',l:'Audio Script',s:'retrieved chunks를 내레이션 대본으로 변환하고 source 유지',req:{pack_id:D.pack.pack_id,query:'course pack overview',output_root:'outputs/static_demo',top_k:6,mode:'briefing_3min',llm_provider:'ollama',llm_model:'gemma2:2b'},res:()=>D.audioScript,ren:audio},
{id:'map',m:'POST',p:'/v2/course-packs/concept-map',l:'Concept Map',s:'relation edge와 evidence(doc/page/chunk)를 함께 확인',req:{pack_id:D.pack.pack_id,output_root:'outputs/static_demo'},res:()=>D.conceptMap,ren:map},
{id:'artifacts',m:'GET',p:'/v2/course-packs/{pack_id}/artifacts',l:'Artifacts',s:'엔드포인트 실행 후 남는 JSON, Mermaid, HTML 산출물 목록',req:{pack_id:D.pack.pack_id,output_root:'outputs/static_demo',include_content:false},res:()=>D.artifacts,ren:artifacts}
];let cur=E[0];const $=id=>document.getElementById(id),esc=v=>String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
function init(){let nav=$('nav');nav.innerHTML='<div class="nav-title">Course Pack endpoints</div>'+E.map(e=>`<button class="ep" type="button" aria-selected="${e.id===cur.id}" data-id="${e.id}"><span class="method ${e.m==='GET'?'get':'post'}">${e.m}</span><span><b>${esc(e.l)}</b><span>${esc(e.p)}</span></span></button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>sel(b.dataset.id));document.querySelectorAll('[data-json]').forEach(b=>b.onclick=()=>{mode=b.dataset.json;json()});render()}
function sel(id){cur=E.find(e=>e.id===id)||E[0];document.querySelectorAll('[data-id]').forEach(b=>b.setAttribute('aria-selected',b.dataset.id===id));render()}
function render(){let r=cur.res();$('title').textContent=cur.l;$('subtitle').textContent=cur.s;$('renderTitle').textContent=`${cur.m} ${cur.p}`;$('renderMeta').textContent=`pack_id: ${D.pack.pack_id}`;$('status').innerHTML=`<span class="pill ${(r.warnings||[]).length?'warn':'good'}">warnings ${(r.warnings||[]).length}</span><span class="pill">${cur.m}</span>`;$('rendered').innerHTML=cur.ren(r);json();bindGraph()}
function json(){document.querySelectorAll('[data-json]').forEach(b=>b.setAttribute('aria-selected',b.dataset.json===mode));$('json').textContent=JSON.stringify(mode==='request'?cur.req:cur.res(),null,2)}
function source(s){let lecture=[s.week?`week ${s.week}`:null,s.lecture_no?`lecture ${s.lecture_no}`:null].filter(Boolean).join(' · ');let prefix=lecture?lecture+' · ':'';return `<div class="item"><b>${esc(s.filename)}</b><span>${prefix}page ${s.page} · ${esc(s.chunk_id)} · ${esc(s.doc_id)}</span></div>`}
function ingest(p){return `<div class="pills"><span class="pill good">${esc(p.pack_id)}</span><span class="pill">documents ${p.document_count}</span><span class="pill">chunks ${p.chunk_count}</span></div><div class="label">Documents</div><div class="list">${p.documents.map(d=>`<div class="item"><b>${esc(d.filename)}</b><span>${esc(d.doc_id)} · pages ${d.page_count} · chunks ${d.chunk_count}</span></div>`).join('')}</div><div class="label">Output</div><div class="item"><b>${esc(p.output_dir)}</b><span>course_pack.json, chunks.json, graph.json 생성 위치</span></div>`}
function ask(a){return `<div class="answer">${esc(a.answer)}</div><div class="label">Sources</div><div class="list">${a.sources.map(source).join('')}</div>`}
function summary(s){return `<div class="answer">${esc(s.overview.text)}</div><div class="label">Lecture summaries</div><div class="list">${s.lecture_summaries.map(x=>`<div class="item"><b>${esc(x.filename)}</b><span>${esc(x.text)}</span><div class="list">${x.sources.map(source).join('')}</div></div>`).join('')}</div><div class="label">Key concepts</div><div class="pills">${s.key_concepts.map(c=>`<span class="pill">${esc(c)}</span>`).join('')}</div>`}function study(s){return `<div class="answer">${esc(s.summary.text)}</div><div class="label">Key points</div><div class="list">${s.key_points.map(x=>`<div class="item"><b>${esc(x.text)}</b><div class="list">${x.sources.map(source).join('')}</div></div>`).join('')}</div><div class="label">Quiz</div><div class="list">${s.quiz.map(q=>`<div class="item"><b>${esc(q.question)}</b><span>${esc(q.answer)}</span></div>`).join('')}</div><div class="label">Flashcards</div><div class="pills">${s.flashcards.map(f=>`<span class="pill">${esc(f.front)}: ${esc(f.back)}</span>`).join('')}</div>`}
function audio(a){let llm=a.llm||{};return `<div class="pills"><span class="pill">mode ${esc(a.mode)}</span><span class="pill good">tts ${esc(a.tts_status)}</span><span class="pill">llm ${esc(llm.provider||'mock')}:${esc(llm.model||'rule')}</span></div><div class="list">${a.script.map((x,i)=>`<div class="item"><b>${i+1}. ${esc(x.speaker)}</b><span>${esc(x.text)}</span><div class="list">${x.sources.map(source).join('')}</div></div>`).join('')}</div>`}
function map(g){let by=Object.fromEntries(g.nodes.map(n=>[n.id,n]));let edges=g.edges.map(e=>{let s=by[e.source],t=by[e.target];if(!s||!t)return'';return `<g><line class="edge" x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}"/><text class="edge-label" x="${(s.x+t.x)/2}" y="${(s.y+t.y)/2-7}">${esc(e.relation)}</text></g>`}).join('');let nodes=g.nodes.map(n=>n.type==='document'?`<g class="node document" data-node="${esc(n.id)}"><rect x="${n.x-58}" y="${n.y-22}" width="116" height="44" rx="7"/><text x="${n.x}" y="${n.y+4}">${esc(n.label)}</text></g>`:`<g class="node ${n.type==='output'?'output':'concept'}" data-node="${esc(n.id)}"><circle cx="${n.x}" cy="${n.y}" r="34"/><text x="${n.x}" y="${n.y+4}">${esc(n.label)}</text></g>`).join('');return `<div class="graph"><svg viewBox="0 0 840 430" role="img" aria-label="Course Pack concept map">${edges}${nodes}</svg></div><div class="item" id="evidence"><b>Graph evidence</b><span>노드를 클릭하면 연결 관계가 표시됩니다.</span></div>`}
function artifacts(a){let list=Object.values(a.artifacts);return `<div class="pills"><span class="pill good">output_dir</span><span class="pill">${esc(a.output_dir)}</span></div><div class="list">${list.map(x=>`<div class="item"><b>${esc(x.name)}</b><span>${x.exists?'exists':'missing'} · ${esc(x.path)}</span></div>`).join('')}</div><div class="label">Saved answers</div><div class="list">${a.answers.map(x=>`<div class="item"><b>${esc(x.name)}</b><span>${esc(x.path)}</span></div>`).join('')}</div>`}
function bindGraph(){let box=$('evidence');if(!box)return;document.querySelectorAll('[data-node]').forEach(n=>n.onclick=()=>{let id=n.dataset.node,rels=D.conceptMap.edges.filter(e=>e.source===id||e.target===id).map(e=>`${e.source} ${e.relation} ${e.target}`);box.innerHTML=`<b>${esc(id)}</b><span>${rels.length?esc(rels.join(' · ')):'연결 edge가 없습니다.'}</span>`})}
function edgeEvidence(e){return (e.evidence||[]).map(source).join('')}
function map(g){let by=Object.fromEntries(g.nodes.map(n=>[n.id,n]));let edges=g.edges.map(e=>{let s=by[e.source],t=by[e.target];if(!s||!t)return'';return `<g data-edge="${esc(e.source+'|'+e.target+'|'+e.relation)}"><line class="edge" x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}"/><text class="edge-label" x="${(s.x+t.x)/2}" y="${(s.y+t.y)/2-7}">${esc(e.relation)}</text></g>`}).join('');let nodes=g.nodes.map(n=>n.type==='document'?`<g class="node document" data-node="${esc(n.id)}"><rect x="${n.x-58}" y="${n.y-22}" width="116" height="44" rx="7"/><text x="${n.x}" y="${n.y+4}">${esc(n.label)}</text></g>`:`<g class="node ${n.type==='output'?'output':'concept'}" data-node="${esc(n.id)}"><circle cx="${n.x}" cy="${n.y}" r="34"/><text x="${n.x}" y="${n.y+4}">${esc(n.label)}</text></g>`).join('');let evidenceList=g.edges.map(e=>`<div class="item"><b>${esc(e.source)} → ${esc(e.target)} · ${esc(e.relation)}</b><div class="list">${edgeEvidence(e)}</div></div>`).join('');return `<div class="graph"><svg viewBox="0 0 840 430" role="img" aria-label="Course Pack concept map with evidence-backed edges">${edges}${nodes}</svg></div><div class="item" id="evidence"><b>GraphRAG-lite edge evidence</b><span>각 relation edge는 source document, page, chunk_id를 evidence로 가집니다. 노드를 클릭하면 연결된 edge와 evidence만 좁혀 보여줍니다.</span></div><div class="label">Evidence-backed edges</div><div class="list" id="edgeList">${evidenceList}</div>`}
function bindGraph(){let box=$('evidence'),edgeList=$('edgeList');if(!box||!edgeList)return;document.querySelectorAll('[data-node]').forEach(n=>n.onclick=()=>{let id=n.dataset.node,edges=D.conceptMap.edges.filter(e=>e.source===id||e.target===id);box.innerHTML=`<b>${esc(id)}</b><span>${edges.length?esc(edges.map(e=>`${e.source} ${e.relation} ${e.target}`).join(' · ')):'연결 edge가 없습니다.'}</span>`;edgeList.innerHTML=edges.length?edges.map(e=>`<div class="item"><b>${esc(e.source)} → ${esc(e.target)} · ${esc(e.relation)}</b><div class="list">${edgeEvidence(e)}</div></div>`).join(''):'<div class="item"><b>No edge evidence</b><span>선택한 노드에 연결된 evidence edge가 없습니다.</span></div>'})}
init();
